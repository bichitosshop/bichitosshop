<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>PageCraft — Creador de páginas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700;800&family=Luckiest+Guy&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --purple:#7C3AED;--purple-dark:#5B21B6;--purple-light:#A78BFA;--purple-pale:#DDD6FE;
  --coral:#FF6B6B;--teal:#38B2AC;--yellow:#F6AD55;--pink:#EC4899;--green:#10B981;
  --dark:#1F1A3A;--gray:#718096;--gray-light:#E2E8F0;--gray-bg:#F8F7FC;--white:#FFFFFF;
  --radius-sm:8px;--radius-md:14px;--radius-lg:20px;--radius-full:9999px;
  --shadow:0 4px 20px rgba(0,0,0,0.08);--shadow-lg:0 8px 40px rgba(0,0,0,0.12);
  --transition:0.3s cubic-bezier(0.4,0,0.2,1);--bounce:0.5s cubic-bezier(0.68,-0.55,0.265,1.55);
  --font-display:'Fredoka',sans-serif;--font-body:'Nunito',sans-serif;
  --editor-bottom:68px;--editor-top:52px;
}
body{font-family:var(--font-body);color:var(--dark);background:#1a1a2e;overflow:hidden;height:100dvh;width:100dvw;touch-action:manipulation;-webkit-user-select:none;user-select:none}
button,input,select,textarea{font-family:inherit;font-size:inherit;border:none;background:none;outline:none}
button{cursor:pointer}
input[type="text"],input[type="number"],input[type="url"],textarea,select{background:var(--white);border:2px solid var(--gray-light);border-radius:var(--radius-sm);padding:8px 12px;width:100%;font-size:0.85rem}
input:focus,textarea:focus,select:focus{border-color:var(--purple);box-shadow:0 0 0 3px var(--purple-pale)}
input[type="color"]{height:40px;padding:3px;border-radius:var(--radius-sm);cursor:pointer;border:2px solid var(--gray-light)}
hr{margin:12px 0;border:none;border-top:1px solid var(--gray-light)}

/* ====== TOP BAR ====== */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--editor-top);background:linear-gradient(135deg,#2D1B69,#1a1a2e);display:flex;align-items:center;justify-content:space-between;padding:0 12px;z-index:100;border-bottom:1px solid rgba(255,255,255,0.1)}
.topbar-title{font-family:var(--font-display);font-size:1.1rem;color:var(--white);display:flex;align-items:center;gap:6px}
.topbar-title span{background:linear-gradient(135deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar-actions{display:flex;gap:6px}
.topbar-btn{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:rgba(255,255,255,0.7);transition:var(--transition);background:rgba(255,255,255,0.06)}
.topbar-btn.active,.topbar-btn:hover{background:rgba(255,255,255,0.15);color:var(--white)}
.topbar-btn.export-btn{background:var(--purple);color:white;width:auto;padding:0 14px;gap:4px;font-size:0.8rem;font-weight:700}
.topbar-btn.export-btn:hover{background:var(--purple-dark)}
.mode-toggle{display:flex;gap:2px;background:rgba(255,255,255,0.08);border-radius:var(--radius-sm);padding:2px}
.mode-toggle button{width:32px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.85rem;color:rgba(255,255,255,0.5);transition:var(--transition)}
.mode-toggle button.active{background:rgba(255,255,255,0.15);color:var(--white)}

/* ====== CANVAS ====== */
.canvas-wrap{position:fixed;top:var(--editor-top);left:0;right:0;bottom:var(--editor-bottom);overflow-y:auto;overflow-x:hidden;background:#e8e6f0;transition:var(--transition)}
.canvas-wrap.mobile{left:auto;right:auto;width:375px;margin:0 auto;box-shadow:0 0 40px rgba(0,0,0,0.3);border-radius:0}
.canvas-inner{min-height:100%;padding:0;background:var(--white)}
.canvas-inner .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:40px;text-align:center;color:var(--gray)}
.canvas-inner .empty-state-icon{font-size:3rem;margin-bottom:12px;opacity:0.3}
.canvas-inner .empty-state h3{font-family:var(--font-display);color:var(--dark);margin-bottom:6px}
.canvas-inner .empty-state p{font-size:0.9rem;margin-bottom:20px}

/* Selected section highlight */
.sec-wrap{position:relative;transition:var(--transition);cursor:pointer}
.sec-wrap::after{content:'';position:absolute;inset:0;border:2px solid transparent;border-radius:0;pointer-events:none;transition:var(--transition)}
.sec-wrap.selected::after{border-color:var(--purple);box-shadow:inset 0 0 0 2px var(--purple);z-index:5}
.sec-wrap .sec-tools{position:absolute;top:4px;right:4px;display:none;gap:4px;z-index:10}
.sec-wrap.selected .sec-tools{display:flex}
.sec-tools button{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;background:var(--purple);color:white;transition:var(--transition);box-shadow:var(--shadow)}
.sec-tools button:hover{transform:scale(1.1)}

/* ====== BOTTOM BAR ====== */
.bottombar{position:fixed;bottom:0;left:0;right:0;height:var(--editor-bottom);background:var(--dark);display:flex;align-items:stretch;justify-content:space-around;z-index:100;border-top:1px solid rgba(255,255,255,0.08);padding:0 4px}
.bottombar-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:0.6rem;color:rgba(255,255,255,0.4);transition:var(--transition);padding:4px 2px;border-radius:var(--radius-sm);position:relative}
.bottombar-btn .icon{font-size:1.2rem;line-height:1}
.bottombar-btn.active,.bottombar-btn:hover{color:var(--white);background:rgba(255,255,255,0.06)}
.bottombar-btn.has-edit-badge::after{content:'●';position:absolute;top:4px;right:12px;font-size:0.5rem;color:var(--coral)}
.sec-count-badge{position:absolute;top:2px;right:6px;font-size:0.55rem;background:var(--coral);color:white;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;padding:0 4px}

/* ====== PANEL OVERLAY ====== */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:50;opacity:0;pointer-events:none;transition:opacity 0.3s}
.panel-overlay.open{opacity:1;pointer-events:all}
.panel{position:fixed;bottom:0;left:0;right:0;max-height:75dvh;background:var(--white);border-radius:var(--radius-lg) var(--radius-lg) 0 0;z-index:60;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1);overflow:hidden;display:flex;flex-direction:column}
.panel.open{transform:translateY(0)}
.panel-handle{width:40px;height:4px;border-radius:2px;background:var(--gray-light);margin:10px auto 6px;flex-shrink:0}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 12px;border-bottom:1px solid var(--gray-light);flex-shrink:0}
.panel-title{font-family:var(--font-display);font-size:1.1rem;color:var(--dark)}
.panel-close{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--gray-bg);font-size:1rem;transition:var(--transition)}
.panel-close:hover{background:var(--gray-light)}
.panel-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}

/* Panel tabs within a panel */
.panel-inner-tabs{display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;flex-shrink:0}
.panel-inner-tab{padding:7px 14px;border-radius:var(--radius-full);font-size:0.75rem;font-weight:700;white-space:nowrap;background:var(--gray-bg);transition:var(--transition)}
.panel-inner-tab.active{background:var(--purple);color:white}
.panel-inner-content{display:none}
.panel-inner-content.active{display:block}

/* ====== SECTION BROWSER ====== */
.cat-group{margin-bottom:16px}
.cat-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0;cursor:pointer;font-weight:700;font-size:0.85rem;color:var(--dark)}
.cat-header .arrow{transition:transform var(--transition)}
.cat-header.open .arrow{transform:rotate(90deg)}
.cat-items{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.cat-items.collapsed{display:none}
.section-opt{padding:8px 10px;border-radius:var(--radius-sm);background:var(--gray-bg);font-size:0.8rem;font-weight:600;transition:var(--transition);text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}
.section-opt .preview-icon{font-size:1.2rem}
.section-opt:hover{background:var(--purple-pale);transform:translateY(-1px)}

/* ====== EDIT FORM ====== */
.edit-field{margin-bottom:14px}
.edit-field label{display:block;font-size:0.7rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.edit-field .field-row{display:flex;gap:8px;align-items:center}
.color-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.slider-row{display:flex;gap:8px;align-items:center}
.slider-row input[type="range"]{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--gray-light)}
.slider-row input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--purple);cursor:pointer}
.slider-val{min-width:32px;text-align:center;font-weight:700;font-size:0.85rem}
.style-btn-group{display:flex;flex-wrap:wrap;gap:4px}
.style-btn{padding:6px 12px;border-radius:var(--radius-sm);font-size:0.75rem;font-weight:600;background:var(--gray-bg);transition:var(--transition);border:2px solid transparent}
.style-btn.active,.style-btn:hover{border-color:var(--purple);background:var(--purple-pale);color:var(--purple-dark)}
.font-opt{width:100%;text-align:left;padding:8px 12px;border-radius:var(--radius-sm);font-size:0.85rem;transition:var(--transition);margin-bottom:4px}
.font-opt:hover,.font-opt.active{background:var(--purple-pale)}

/* ====== SECTIONS LIST ====== */
.section-list-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);background:var(--gray-bg);margin-bottom:6px;transition:var(--transition)}
.section-list-item:active{transform:scale(0.98)}
.section-list-item .drag-icon{font-size:0.9rem;color:var(--gray);cursor:grab}
.section-list-item .sli-icon{font-size:1.1rem}
.section-list-item .sli-info{flex:1;min-width:0}
.section-list-item .sli-name{font-weight:700;font-size:0.85rem}
.section-list-item .sli-cat{font-size:0.7rem;color:var(--gray)}
.section-list-item .sli-actions{display:flex;gap:4px}
.section-list-item .sli-actions button{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:0.8rem;transition:var(--transition)}
.section-list-item .sli-actions .dup-btn{background:var(--purple-pale);color:var(--purple-dark)}
.section-list-item .sli-actions .del-btn{background:var(--coral);color:white}

/* ====== EXPORT MODAL ====== */
.export-modal{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:var(--transition);padding:20px}
.export-modal.open{opacity:1;pointer-events:all}
.export-box{background:var(--white);border-radius:var(--radius-lg);padding:24px;max-width:400px;width:100%;text-align:center;transform:scale(0.9);transition:transform 0.4s cubic-bezier(0.4,0,0.2,1)}
.export-modal.open .export-box{transform:scale(1)}
.export-box h3{font-family:var(--font-display);font-size:1.3rem;margin-bottom:6px}
.export-box p{color:var(--gray);font-size:0.85rem;margin-bottom:16px}
.export-box textarea{width:100%;min-height:100px;font-family:monospace;font-size:0.75rem;margin-bottom:12px}
.export-actions{display:flex;gap:8px;justify-content:center}
.export-actions button{padding:10px 20px;border-radius:var(--radius-full);font-weight:700;font-size:0.85rem;transition:var(--transition)}
.export-actions .export-copy{background:var(--purple);color:white}
.export-actions .export-copy:hover{background:var(--purple-dark)}
.export-actions .export-close{background:var(--gray-bg)}
.export-actions .export-close:hover{background:var(--gray-light)}
.export-actions .export-dl{background:var(--dark);color:white}
.export-actions .export-dl:hover{background:#000}

/* ====== TOAST ====== */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:var(--radius-full);background:var(--dark);color:white;font-weight:600;font-size:0.85rem;z-index:300;opacity:0;transition:var(--transition);pointer-events:none;white-space:nowrap;box-shadow:var(--shadow-lg)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.coral{background:var(--coral)}
.toast.green{background:var(--green)}

/* ====== TABLET+ ====== */
@media(min-width:768px){
  :root{--editor-top:56px}
  .panel{max-height:70dvh}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-title">🎨 <span>PageCraft</span></div>
  <div class="mode-toggle" id="mode-toggle">
    <button class="active" data-mode="mobile" onclick="setViewMode('mobile')">📱</button>
    <button data-mode="desktop" onclick="setViewMode('desktop')">💻</button>
  </div>
  <div class="topbar-actions">
    <button class="topbar-btn" onclick="showPanel('sections')" title="Ver secciones">📋</button>
    <button class="topbar-btn export-btn" onclick="exportHTML()">🚀 Exportar</button>
  </div>
</div>

<!-- CANVAS -->
<div class="canvas-wrap mobile" id="canvas-wrap">
  <div class="canvas-inner" id="canvas">
    <div class="empty-state" id="empty-state">
      <div class="empty-state-icon">📄</div>
      <h3>Tu página está vacía</h3>
      <p>Tocá <strong>➕ Agregar</strong> abajo para empezar</p>
    </div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottombar">
  <button class="bottombar-btn active" data-panel="sections" onclick="showPanel('sections')">
    <span class="icon">➕</span> Agregar
  </button>
  <button class="bottombar-btn" data-panel="edit" onclick="showPanel('edit')" id="edit-btn">
    <span class="icon">✏️</span> Editar
    <span class="sec-count-badge" id="sec-count" style="display:none">0</span>
  </button>
  <button class="bottombar-btn" data-panel="list" onclick="showPanel('list')">
    <span class="icon">📋</span> Secciones
    <span class="sec-count-badge" id="sec-count2" style="display:none">0</span>
  </button>
  <button class="bottombar-btn" onclick="exportHTML()">
    <span class="icon">🚀</span> Exportar
  </button>
</div>

<!-- PANEL OVERLAY -->
<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>

<!-- SECTIONS PANEL -->
<div class="panel" id="panel-sections">
  <div class="panel-handle"></div>
  <div class="panel-header">
    <div class="panel-title">➕ Agregar sección</div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="section-browser"></div>
</div>

<!-- EDIT PANEL -->
<div class="panel" id="panel-edit">
  <div class="panel-handle"></div>
  <div class="panel-header">
    <div class="panel-title">✏️ Editar sección</div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="edit-body">
    <div class="empty-state" style="min-height:auto;padding:20px">
      <p style="color:var(--gray);font-size:0.9rem">Tocá una sección en la página para editarla</p>
    </div>
  </div>
</div>

<!-- SECTIONS LIST PANEL -->
<div class="panel" id="panel-list">
  <div class="panel-handle"></div>
  <div class="panel-header">
    <div class="panel-title">📋 Secciones</div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="list-body"></div>
</div>

<!-- EXPORT MODAL -->
<div class="export-modal" id="export-modal" onclick="if(event.target===this)closeExport()">
  <div class="export-box">
    <h3>🚀 HTML generado</h3>
    <p>Copiá el código o descargalo como archivo</p>
    <textarea id="export-code" readonly></textarea>
    <div class="export-actions">
      <button class="export-copy" onclick="copyExport()">📋 Copiar</button>
      <button class="export-dl" onclick="downloadExport()">⬇️ Descargar</button>
      <button class="export-close" onclick="closeExport()">Cerrar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ====== STATE ======
let pageSections = [];
let selectedId = null;
let currentPanel = 'sections';
let viewMode = 'mobile';
let nextId = 0;

// ====== FONTS ======
const FONTS = [
  {name:'Fredoka',category:'Display',family:'Fredoka, sans-serif'},
  {name:'Nunito',category:'Sans-serif',family:'Nunito, sans-serif'},
  {name:'Poppins',category:'Sans-serif',family:'Poppins, sans-serif'},
  {name:'Inter',category:'Sans-serif',family:'Inter, sans-serif'},
  {name:'Montserrat',category:'Sans-serif',family:'Montserrat, sans-serif'},
  {name:'Playfair Display',category:'Serif',family:'Playfair Display, serif'},
  {name:'Bebas Neue',category:'Display',family:'\"Bebas Neue\", sans-serif'},
  {name:'Luckiest Guy',category:'Display',family:'\"Luckiest Guy\", cursive'}
];

// ====== ANIMATIONS ======
const ANIMS = [
  {id:'none',name:'Ninguna',css:''},
  {id:'fade',name:'Desvanecer',css:'animation:fadeUp 0.6s ease forwards'},
  {id:'bounce',name:'Rebotar',css:'animation:bounceIn 0.6s cubic-bezier(0.68,-0.55,0.265,1.55) forwards'},
  {id:'slideUp',name:'Subir',css:'animation:slideUp 0.5s ease forwards'},
  {id:'slideLeft',name:'Izquierda',css:'animation:slideLeft 0.5s ease forwards'},
  {id:'pulse',name:'Latido',css:'animation:pulse 2s ease-in-out infinite'},
  {id:'shake',name:'Temblor',css:'animation:shake 0.5s ease forwards'},
  {id:'rotate',name:'Rotar',css:'animation:rotateIn 0.6s ease forwards'},
  {id:'zoom',name:'Zoom',css:'animation:zoomIn 0.5s ease forwards'},
  {id:'float',name:'Flotar',css:'animation:float 3s ease-in-out infinite'}
];

// ====== SECTION DEFINITIONS ======
const SECTION_CATEGORIES = [
  {id:'hero',name:'🏠 Hero',icon:'🏠'},
  {id:'text',name:'✏️ Texto',icon:'✏️'},
  {id:'buttons',name:'🔘 Botones',icon:'🔘'},
  {id:'cards',name:'📦 Tarjetas',icon:'📦'},
  {id:'features',name:'⭐ Features',icon:'⭐'},
  {id:'testimonials',name:'💬 Testimonios',icon:'💬'},
  {id:'stats',name:'📊 Stats',icon:'📊'},
  {id:'pricing',name:'💰 Precios',icon:'💰'},
  {id:'cta',name:'🎯 CTA',icon:'🎯'},
  {id:'contact',name:'📞 Contacto',icon:'📞'},
  {id:'newsletter',name:'📧 Newsletter',icon:'📧'},
  {id:'gallery',name:'🖼️ Galería',icon:'🖼️'},
  {id:'team',name:'👥 Equipo',icon:'👥'},
  {id:'faq',name:'❓ FAQ',icon:'❓'},
  {id:'footer',name:'🔻 Footer',icon:'🔻'},
  {id:'other',name:'🧩 Otros',icon:'🧩'}
];

function sid(){return 'sec_'+(nextId++)}

function def(t){return{
  hero:[
    {id:sid(),type:'hero-simple',cat:'hero',name:'Hero Simple',icon:'🏠',props:{
      title:'Título principal',subtitle:'Subtítulo que describe tu propuesta',btnText:'Comenzar',btnUrl:'#',
      bg:'#7C3AED',color:'#FFFFFF',font:'Fredoka, sans-serif',sizes:'l',padding:'80px 20px',
      anim:'fade',animSpeed:0.6,btnStyle:'solid'
    }},
    {id:sid(),type:'hero-split',cat:'hero',name:'Hero Split',icon:'↔️',props:{
      title:'Título principal',subtitle:'Subtítulo descriptivo con más texto',btnText:'Ver más',btnUrl:'#',
      bg:'#FFFFFF',color:'#1F1A3A',font:'Fredoka, sans-serif',sizes:'l',padding:'60px 20px',
      anim:'fade',animSpeed:0.6,imgColor:'#7C3AED',imgText:'[IMAGEN]',btnStyle:'outline'
    }},
    {id:sid(),type:'hero-full',cat:'hero',name:'Hero Fullscreen',icon:'🖥️',props:{
      title:'Bienvenidos',subtitle:'Creamos experiencias increíbles',btnText:'Explorar',btnUrl:'#',
      bg:'#5B21B6',color:'#FFFFFF',font:'Fredoka, sans-serif',sizes:'xl',padding:'120px 20px',
      anim:'zoom',animSpeed:0.6,btnStyle:'solid'
    }},
    {id:sid(),type:'hero-stats',cat:'hero',name:'Hero con Stats',icon:'📊',props:{
      title:'Resultados que hablan',subtitle:'Miles de clientes confían en nosotros',btnText:'Empezar',btnUrl:'#',
      bg:'#1F1A3A',color:'#FFFFFF',font:'Fredoka, sans-serif',sizes:'l',padding:'80px 20px',
      anim:'fade',animSpeed:0.6,s1:'500+',s1l:'Clientes',s2:'99%',s2l:'Satisfacción',s3:'10+',s3l:'Años',btnStyle:'solid'
    }},
    {id:sid(),type:'hero-form',cat:'hero',name:'Hero con Form',icon:'📝',props:{
      title:'Contactanos hoy',subtitle:'Dejanos tu mensaje y te respondemos',btnText:'Enviar',btnUrl:'#',
      bg:'linear-gradient(135deg,#7C3AED,#EC4899)',color:'#FFFFFF',font:'Fredoka, sans-serif',sizes:'l',padding:'60px 20px',

let defs={};let allDefs=[];
for(let c of Object.keys(def)){defs[c]=def[c]();allDefs=allDefs.concat(defs[c])}

// ====== FIND SECTION TYPE ======
function getSectionType(typeId){return allDefs.find(d=>d.type===typeId)}

// ====== DEFAULT PROPS FOR TYPE ======
function defaultProps(type){const t=getSectionType(type);return t?JSON.parse(JSON.stringify(t.props)):{}}

// ====== ADD SECTION ======
function addSection(typeId){
  const tmpl=getSectionType(typeId);
  if(!tmpl)return;
  const sec={id:sid(),type:typeId,cat:tmpl.cat,name:tmpl.name,icon:tmpl.icon,props:JSON.parse(JSON.stringify(tmpl.props))};
  pageSections.push(sec);
  renderCanvas();selectSection(sec.id);closePanel();
  updateCounts();showToast('✅ Sección agregada: '+tmpl.name,'green');
}

// ====== SELECT SECTION ======
function selectSection(id){
  selectedId=id;
  renderCanvas();
  if(id&&currentPanel==='edit')renderEditForm(id);
  updateCounts();
}
function deselectSection(){selectedId=null;renderCanvas();updateCounts()}

// ====== DELETE SECTION ======
function deleteSection(id){
  pageSections=pageSections.filter(s=>s.id!==id);
  if(selectedId===id)selectedId=null;
  renderCanvas();updateCounts();
  if(currentPanel==='edit')renderEditForm(selectedId);
  showToast('🗑️ Sección eliminada');
}

// ====== DUPLICATE SECTION ======
function dupSection(id){
  const idx=pageSections.findIndex(s=>s.id===id);
  if(idx<0)return;
  const orig=pageSections[idx];
  const dup=JSON.parse(JSON.stringify(orig));
  dup.id=sid();dup.name=orig.name+' (copia)';
  pageSections.splice(idx+1,0,dup);
  renderCanvas();selectSection(dup.id);updateCounts();
  showToast('📋 Sección duplicada');
}

// ====== MOVE SECTION ======
function moveSection(id,dir){
  const idx=pageSections.findIndex(s=>s.id===id);
  if(idx<0)return;
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=pageSections.length)return;
  [pageSections[idx],pageSections[newIdx]]=[pageSections[newIdx],pageSections[idx]];
  renderCanvas();selectSection(id);updateCounts();
}

// ====== UPDATE SECTION PROP ======
function updateProp(id,key,val){
  const sec=pageSections.find(s=>s.id===id);
  if(!sec)return;
  sec.props[key]=val;
  renderCanvas();if(currentPanel==='edit')renderEditForm(id);
}

// ====== RENDER CANVAS ======
function renderCanvas(){
  const canvas=document.getElementById('canvas');
  if(pageSections.length===0){
    canvas.innerHTML='<div class="empty-state"><div class="empty-state-icon">📄</div><h3>Tu página está vacía</h3><p>Tocá <strong>➕ Agregar</strong> abajo para empezar</p></div>';
    return;
  }
  canvas.innerHTML=pageSections.map(sec=>{
    const sel=sec.id===selectedId?' selected':'';
    return `<div class="sec-wrap${sel}" data-id="${sec.id}" onclick="selectSection('${sec.id}')">
      <div class="sec-tools">
        <button onclick="event.stopPropagation();moveSection('${sec.id}',-1)" title="Subir">↑</button>
        <button onclick="event.stopPropagation();moveSection('${sec.id}',1)" title="Bajar">↓</button>
        <button onclick="event.stopPropagation();dupSection('${sec.id}')" title="Duplicar">📋</button>
        <button onclick="event.stopPropagation();deleteSection('${sec.id}')" title="Eliminar">🗑️</button>
      </div>
      ${renderSection(sec)}
    </div>`;
  }).join('');
}

// ====== PANEL SYSTEM ======
function showPanel(name){
  currentPanel=name;
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('open'));
  document.querySelectorAll('.bottombar-btn').forEach(b=>b.classList.toggle('active',b.dataset.panel===name));
  const panel=document.getElementById('panel-'+name);
  if(panel){panel.classList.add('open');document.getElementById('panel-overlay').classList.add('open')}
  if(name==='sections')renderSectionBrowser();
  if(name==='edit')renderEditForm(selectedId);
  if(name==='list')renderSectionList();
}

function closePanel(){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('open'));
  document.getElementById('panel-overlay').classList.remove('open');
  document.querySelectorAll('.bottombar-btn').forEach(b=>b.classList.remove('active'));
}

// ====== SECTION BROWSER ======
function renderSectionBrowser(){
  const container=document.getElementById('section-browser');
  if(!container)return;
  let html='';
  for(let cat of SECTION_CATEGORIES){
    const sections=allDefs.filter(s=>s.cat===cat.id);
    if(sections.length===0)continue;
    html+=`<div class="cat-group">
      <div class="cat-header open" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('collapsed')">
        <span>${cat.name} (${sections.length})</span>
        <span class="arrow">▶</span>
      </div>
      <div class="cat-items">`;
    sections.forEach(s=>{
      html+=`<div class="section-opt" onclick="addSection('${s.type}')">
        <span class="preview-icon">${s.icon||'📄'}</span>
        <span>${s.name}</span>
      </div>`;
    });
    html+=`</div></div>`;
  }
  container.innerHTML=html;
}

// ====== EDIT FORM ======
function renderEditForm(id){
  const container=document.getElementById('edit-body');
  if(!id||!pageSections.find(s=>s.id===id)){
    container.innerHTML='<div class="empty-state" style="min-height:auto;padding:20px"><p style="color:var(--gray);font-size:0.9rem">Tocá una sección en la página para editarla</p></div>';
    return;
  }
  const sec=pageSections.find(s=>s.id===id);
  const p=sec.props;
  // Common editable fields
  let html='<div class="panel-inner-tabs" id="edit-tabs">';
  const tabs=['📝 Contenido','🎨 Colores','🅰️ Tipografía','✨ Animación','⚙️ Ajustes'];
  html+=tabs.map((t,i)=>`<span class="panel-inner-tab${i===0?' active':''}" onclick="switchEditTab(${i},'${id}')">${t}</span>`).join('');
  html+=`</div><div class="panel-inner-content active" id="edit-tab-0">`;
  
  // Tab 0: Content (text fields based on section type)
  html+=renderContentFields(sec);
  html+=`</div><div class="panel-inner-content" id="edit-tab-1">`;
  html+=renderColorFields(sec);
  html+=`</div><div class="panel-inner-content" id="edit-tab-2">`;
  html+=renderFontFields(sec);
  html+=`</div><div class="panel-inner-content" id="edit-tab-3">`;
  html+=renderAnimFields(sec);
  html+=`</div><div class="panel-inner-content" id="edit-tab-4">`;
  html+=renderLayoutFields(sec);
  html+=`</div>`;
  
  container.innerHTML=html;
}

function switchEditTab(idx,id){
  document.querySelectorAll('.panel-inner-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.panel-inner-content').forEach((c,i)=>c.classList.toggle('active',i===idx));
}

function renderContentFields(sec){
  const p=sec.props;const t=sec.type;let h='';
  const add=(label,key,type='text')=>{
    const v=p[key]||'';
    if(type==='textarea') h+=`<div class="edit-field"><label>${label}</label><textarea rows="3" oninput="updateProp('${sec.id}','${key}',this.value)">${v}</textarea></div>`;
    else h+=`<div class="edit-field"><label>${label}</label><input type="${type}" value="${v}" oninput="updateProp('${sec.id}','${key}',this.value)"></div>`;
  };
  // Determine which fields to show based on section type
  if(t.includes('hero')||t.includes('cta')||t.includes('btn')){
    if(p.title!==undefined)add('Título','title');if(p.subtitle!==undefined)add('Subtítulo','subtitle');
    if(p.btnText!==undefined)add('Texto botón','btnText');if(p.btnUrl!==undefined)add('URL botón','btnUrl');
    if(p.btn1Text!==undefined){add('Texto botón 1','btn1Text');add('URL botón 1','btn1Url')}
    if(p.btn2Text!==undefined){add('Texto botón 2','btn2Text');add('URL botón 2','btn2Url')}
    if(p.s1!==undefined){add('Stat 1','s1');add('Label 1','s1l');add('Stat 2','s2');add('Label 2','s2l');add('Stat 3','s3');add('Label 3','s3l')}
  }else if(t.includes('text')){
    if(p.title!==undefined)add('Título','title');if(p.content!==undefined)add('Contenido','content','textarea');
    if(p.col1!==undefined){add('Columna 1','col1','textarea');add('Columna 2','col2','textarea')}
    if(p.quote!==undefined){add('Cita','quote','textarea');add('Autor','author');add('Rol','role')}
    if(p.icon!==undefined)add('Ícono (emoji)','icon');if(p.accent!==undefined)add('Color acento','accent');
  }else if(t.includes('cards')){
    // For cards, show inline editing for each card
    const cards=p.cards||[];
    cards.forEach((card,i)=>{
      h+=`<div style="background:var(--gray-bg);padding:10px;border-radius:8px;margin-bottom:8px">
        <strong style="font-size:0.8rem">Tarjeta ${i+1}</strong>
        <div class="edit-field" style="margin-top:6px"><input type="text" value="${card.title||''}" placeholder="Título" oninput="updateCardProp('${sec.id}',${i},'title',this.value)"></div>
        <div class="edit-field"><input type="text" value="${card.text||''}" placeholder="Texto" oninput="updateCardProp('${sec.id}',${i},'text',this.value)"></div>
      </div>`;
    });
  }else if(t.includes('features')){
    (p.items||[]).forEach((item,i)=>{
      h+=`<div style="background:var(--gray-bg);padding:10px;border-radius:8px;margin-bottom:6px">
        <strong style="font-size:0.8rem">${i+1}</strong>
        <input type="text" value="${item.title||''}" placeholder="Título" style="margin-bottom:4px" oninput="updateItemProp('${sec.id}',${i},'title',this.value)">
        <input type="text" value="${item.text||''}" placeholder="Texto" oninput="updateItemProp('${sec.id}',${i},'text',this.value)">
      </div>`;
    });
  }else{
    // Generic fields
    Object.keys(p).forEach(key=>{
      if(['bg','color','font','sizes','padding','anim','animSpeed','btnStyle','imgColor','imgText','formBg','formColor','align','cols','radius','style','accent','shadow','inputBg'].includes(key))return;
      const v=p[key];
      if(typeof v==='string'&&v.length<100&&!v.includes('\n'))add(key.charAt(0).toUpperCase()+key.slice(1),key);
    });
  }
  return h||'<p style="color:var(--gray);font-size:0.85rem">Contenido editable en los campos superiores</p>';
}

function renderColorFields(sec){
  const p=sec.props;let h='';
  const addColor=(label,key)=>{
    if(p[key]===undefined)return;
    h+=`<div class="edit-field"><label>${label}</label><input type="color" value="${p[key]||'#7C3AED'}" oninput="updateProp('${sec.id}','${key}',this.value)" style="width:100%"></div>`;
  };
  h+=`<div class="color-row">`;
  addColor('Fondo','bg');addColor('Texto','color');
  h+=`</div><div class="color-row">`;
  addColor('Acento','accent');addColor('Borde','borderColor');
  h+=`</div>`;
  if(p.imgColor!==undefined)addColor('Imagen','imgColor');
  if(p.formBg!==undefined)addColor('Form Fondo','formBg');
  if(p.cardBg===undefined)addColor('Card','cardColor');
  return h||'<p style="color:var(--gray);font-size:0.85rem">Colores disponibles</p>';
}

function renderFontFields(sec){
  const p=sec.props;let h='';
  h+=`<div class="edit-field"><label>Tipografía</label>`;
  FONTS.forEach(f=>{
    h+=`<div class="font-opt${p.font===f.family?' active':''}" style="font-family:${f.family}" onclick="updateProp('${sec.id}','font','${f.family}')">${f.name} (${f.category})</div>`;
  });
  h+=`</div>`;
  if(p.sizes!==undefined){
    h+=`<div class="edit-field"><label>Tamaño</label>
      <div class="style-btn-group">
        ${['s','m','l','xl'].map(s=>`<span class="style-btn${p.sizes===s?' active':''}" onclick="updateProp('${sec.id}','sizes','${s}')">${s==='s'?'Chico':s==='m'?'Mediano':s==='l'?'Grande':'XL'}</span>`).join('')}
      </div></div>`;
  }
  if(p.align!==undefined){
    h+=`<div class="edit-field"><label>Alineación</label>
      <div class="style-btn-group">
        ${['left','center','right'].map(a=>`<span class="style-btn${p.align===a?' active':''}" onclick="updateProp('${sec.id}','align','${a}')">${a==='left'?'Izquierda':a==='center'?'Centro':'Derecha'}</span>`).join('')}
      </div></div>`;
  }
  return h;
}

function renderAnimFields(sec){
  const p=sec.props;let h='';
  h+=`<div class="edit-field"><label>Animación al aparecer</label>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">`;
  ANIMS.forEach(a=>{
    h+=`<span class="style-btn${p.anim===a.id?' active':''}" onclick="updateProp('${sec.id}','anim','${a.id}')">${a.name}</span>`;
  });
  h+=`</div></div>`;
  if(p.anim&&p.anim!=='none'){
    h+=`<div class="edit-field"><label>Velocidad: ${p.animSpeed||0.6}s</label>
      <div class="slider-row">
        <input type="range" min="0.2" max="2" step="0.1" value="${p.animSpeed||0.6}" oninput="this.nextElementSibling.textContent=this.value+'s';updateProp('${sec.id}','animSpeed',parseFloat(this.value))">
        <span class="slider-val">${p.animSpeed||0.6}s</span>
      </div></div>`;
  }
  return h;
}

function renderLayoutFields(sec){
  const p=sec.props;let h='';
  h+=`<div class="edit-field"><label>Padding</label>
    <input type="text" value="${p.padding||''}" placeholder="Ej: 60px 20px" oninput="updateProp('${sec.id}','padding',this.value)"></div>`;
  h+=`<div class="edit-field"><label>Ancho máximo</label>
    <input type="text" value="${p.maxWidth||''}" placeholder="Ej: 1100px" oninput="updateProp('${sec.id}','maxWidth',this.value)"></div>`;
  if(p.radius!==undefined){
    h+=`<div class="edit-field"><label>Borde redondeado</label>
      <input type="text" value="${p.radius}" placeholder="Ej: 50px" oninput="updateProp('${sec.id}','radius',this.value)"></div>`;
  }
  if(p.btnStyle!==undefined){
    h+=`<div class="edit-field"><label>Estilo botón</label>
      <div class="style-btn-group">
        <span class="style-btn${p.btnStyle==='solid'?' active':''}" onclick="updateProp('${sec.id}','btnStyle','solid')">Sólido</span>
        <span class="style-btn${p.btnStyle==='outline'?' active':''}" onclick="updateProp('${sec.id}','btnStyle','outline')">Outline</span>
      </div></div>`;
  }
  h+=`<div class="edit-field" style="margin-top:16px;padding-top:16px;border-top:1px solid var(--gray-light)">
    <div style="display:flex;gap:8px">
      <button class="style-btn" onclick="dupSection('${sec.id}')">📋 Duplicar</button>
      <button class="style-btn" style="background:var(--coral);color:white" onclick="deleteSection('${sec.id}');closePanel()">🗑️ Eliminar</button>
    </div>
  </div>`;
  return h;
}

function updateCardProp(id,idx,key,val){
  const sec=pageSections.find(s=>s.id===id);
  if(!sec||!sec.props.cards||!sec.props.cards[idx])return;
  sec.props.cards[idx][key]=val;
  renderCanvas();if(currentPanel==='edit')renderEditForm(id);
}
function updateItemProp(id,idx,key,val){
  const sec=pageSections.find(s=>s.id===id);
  if(!sec||!sec.props.items||!sec.props.items[idx])return;
  sec.props.items[idx][key]=val;
  renderCanvas();if(currentPanel==='edit')renderEditForm(id);
}

// ====== TOAST ======
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast'+(type?' '+type:'');
  t.classList.add('show');clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),2500);
}

// ====== EXPORT ======
function exportHTML(){
  if(pageSections.length===0){showToast('⚠️ Agregá al menos una sección antes de exportar','coral');return}
  let html='<!DOCTYPE html>\n<html lang="es">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1.0">\n<title>Mi Página</title>\n<link rel="preconnect" href="https://fonts.googleapis.com">\n<link href="https://fonts.googleapis.com/css2?';
  // Collect unique fonts
  const usedFonts=new Set();
  pageSections.forEach(s=>{
    const f=s.props.font;
    if(f&&f.includes(',')){
      const name=f.split(',')[0].replace(/['"]/g,'').trim();
      if(name&&!['Nunito','sans-serif'].includes(name))usedFonts.add(name);
    }
  });
  const fontQuery=usedFonts.size>0?Array.from(usedFonts).map(f=>'family='+f.replace(/ /g,'+')+':wght@400;500;600;700;800').join('&'):'family=Nunito:wght@400;600;700;800';
  html+=fontQuery+'&display=swap" rel="stylesheet">\n<style>\n*{box-sizing:border-box;margin:0;padding:0}\nbody{font-family:Nunito,sans-serif;color:#1F1A3A;line-height:1.6}\nimg{max-width:100%;display:block}\na{text-decoration:none;color:inherit}\n.container{max-width:1200px;margin:0 auto;padding:0 20px}\n';
  html+=genAnimCss();
  html+='\n</style>\n</head>\n<body>\n';
  pageSections.forEach(sec=>{html+=renderSection(sec)+'\n'});
  html+='</body>\n</html>';
  document.getElementById('export-code').value=html;
  document.getElementById('export-modal').classList.add('open');
}

function copyExport(){
  const ta=document.getElementById('export-code');
  ta.select();ta.setSelectionRange(0,999999);
  try{navigator.clipboard.writeText(ta.value);showToast('📋 Código copiado','green')}catch(e){showToast('⚠️ No se pudo copiar','coral')}
}
function downloadExport(){
  const html=document.getElementById('export-code').value;
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='mi-pagina.html';
  a.click();URL.revokeObjectURL(a.href);showToast('⬇️ Archivo descargado','green');
}
function closeExport(){document.getElementById('export-modal').classList.remove('open')}

// ====== CLEAR SECTIONS ======
// Add a default section on first load if empty
let templateAdded=false;

// ====== INIT ======
document.addEventListener('DOMContentLoaded',()=>{
  // Add a few default sections to get started
  const heroTmpl=allDefs.find(d=>d.type==='hero-simple');
  if(heroTmpl&&pageSections.length===0){
    const s=JSON.parse(JSON.stringify(heroTmpl));
    s.id=sid();pageSections.push(s);
    const textTmpl=allDefs.find(d=>d.type==='text-simple');
    if(textTmpl){
      const t=JSON.parse(JSON.stringify(textTmpl));
      t.id=sid();t.props.title='Bienvenido a tu página';t.props.content='Esta es tu nueva página web. Tocá cualquier sección para editarla. Agregá más secciones desde el botón ➕ Agregar.';
      pageSections.push(t);
    }
  }
  renderCanvas();updateCounts();
  setTimeout(()=>{renderSectionBrowser();showToast('🎨 Tocá ➕ Agregar para empezar')},500);
  // Close panel on overlay click
  document.getElementById('panel-overlay').onclick=closePanel;
});
</script>
